name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  MONGODB_URI: ${{ secrets.MONGODB_URI }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --production

      - name: Create Lambda deployment package
        run: |
          zip -r function.zip src node_modules package.json \
            -x 'node_modules/.bin/*' \
            'node_modules/*/test/*' \
            'node_modules/*/.git/*' \
            'node_modules/*/.github/*' \
            'node_modules/*/.gitignore' \
            'node_modules/*/README.md' \
            'node_modules/*/LICENSE'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var="mongodb_uri=$MONGODB_URI" -var="infracost_api_key=$INFRACOST_API_KEY" -var="anthropic_api_key=$ANTHROPIC_API_KEY" -out=tfplan
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -var="mongodb_uri=$MONGODB_URI" -var="infracost_api_key=$INFRACOST_API_KEY" -var="anthropic_api_key=$ANTHROPIC_API_KEY" -auto-approve tfplan
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

      - name: Output API Endpoint
        run: |
          cd terraform
          terraform output api_endpoint
